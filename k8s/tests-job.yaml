apiVersion: batch/v1
kind: Job
metadata:
  name: portfolio-tests
  namespace: portfolio
  labels:
    app: portfolio-tests
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: portfolio-tests
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-order-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O- http://order-service:8000/health; do echo waiting for order-service; sleep 3; done
      containers:
        - name: tests
          image: portfolio/tests:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: portfolio-config
          command: ["pytest", "-v", "-s"]
