apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: portfolio
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka-broker 9092; do echo waiting for kafka; sleep 2; done
        - name: wait-payment
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z payment-service 50051; do echo waiting for payment-service; sleep 2; done
      containers:
        - name: order-service
          image: portfolio/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: portfolio-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: portfolio
  labels:
    app: order-service
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
