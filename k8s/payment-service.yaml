apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: portfolio
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka-broker 9092; do echo waiting for kafka; sleep 2; done
      containers:
        - name: payment-service
          image: portfolio/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: portfolio-config
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: portfolio
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
