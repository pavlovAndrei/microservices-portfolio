apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: portfolio
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka-broker 9092; do echo waiting for kafka; sleep 2; done
      containers:
        - name: inventory-service
          image: portfolio/inventory-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: portfolio-config
