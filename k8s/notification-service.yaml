apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: portfolio
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka-broker 9092; do echo waiting for kafka; sleep 2; done
      containers:
        - name: notification-service
          image: portfolio/notification-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: portfolio-config
